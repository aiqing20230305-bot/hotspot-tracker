<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容日历 - HotSpot Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --sidebar-bg: #0f172a;
      --sidebar-text: #94a3b8;
      --sidebar-active: #e2e8f0;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      color: #fff;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform 0.3s;
    }
    .sidebar-brand {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-brand h2 { font-size: 18px; font-weight: 700; color: #fff; }
    .sidebar-brand span { font-size: 11px; color: var(--sidebar-text); letter-spacing: 0.5px; }
    .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
    .nav-item {
      padding: 12px 20px;
      color: var(--sidebar-text);
      text-decoration: none;
      font-size: 14px;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      cursor: pointer;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item.active { color: #fff; background: rgba(99,102,241,0.2); border-left-color: var(--primary); }
    .nav-item i { font-size: 18px; width: 24px; text-align: center; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
    .sidebar-footer .user-info { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: #fff;
    }
    .user-name { font-size: 13px; color: #e2e8f0; }
    .user-role { font-size: 11px; color: var(--sidebar-text); }

    /* Sidebar mobile toggle */
    .sidebar-toggle {
      display: none;
      position: fixed; top: 14px; left: 14px; z-index: 200;
      width: 38px; height: 38px;
      background: var(--primary); border: none; border-radius: 8px;
      color: #fff; font-size: 18px; cursor: pointer;
      align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

    /* Main Content */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header */
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      position: sticky; top: 0; z-index: 50;
      flex-wrap: wrap;
    }
    .header-title { font-size: 20px; font-weight: 700; white-space: nowrap; }
    .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-primary-custom {
      background: var(--primary); color: #fff; border: none;
      padding: 8px 18px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .btn-primary-custom:hover { background: var(--primary-dark); }
    .btn-export {
      background: #fff; color: var(--text-primary);
      border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-export:hover { border-color: var(--primary); color: var(--primary); background: #f0f1ff; }
    .btn-export i { font-size: 15px; }

    /* Content Area */
    .content { padding: 24px 28px; flex: 1; }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card-bg);
      border-radius: 12px; padding: 18px 20px;
      border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }
    .stat-card:hover { border-color: var(--primary); box-shadow: 0 2px 12px rgba(99,102,241,0.1); }
    .stat-card.active-filter { border-color: var(--primary); background: #eef0ff; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-change { font-size: 12px; margin-top: 4px; }
    .stat-change.up { color: var(--success); }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 16px;
    }
    .filter-group {
      display: flex; align-items: center; gap: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 6px 12px;
    }
    .filter-group-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .filter-select {
      border: none; outline: none; background: transparent;
      font-size: 13px; color: var(--text-primary); cursor: pointer;
    }
    .date-range-input {
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 13px; outline: none;
      transition: border-color 0.2s; color: var(--text-primary); background: #fff;
    }
    .date-range-input:focus { border-color: var(--primary); }
    .btn-reset-filter {
      border: none; background: #fee2e2; color: var(--danger);
      border-radius: 6px; padding: 6px 12px;
      font-size: 12px; cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .btn-reset-filter:hover { background: #fecaca; }
    .search-box {
      position: relative; flex: 1; min-width: 180px;
    }
    .search-box input {
      width: 100%;
      padding: 8px 14px 8px 36px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 13px; outline: none; transition: all 0.2s; background: var(--card-bg);
    }
    .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }

    /* Active filter chips */
    .active-filters { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; background: #eef0ff; color: var(--primary);
      border: 1px solid var(--primary);
    }
    .filter-chip i { cursor: pointer; opacity: 0.7; }
    .filter-chip i:hover { opacity: 1; }

    /* Calendar Section */
    .calendar-section {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--card-bg);
      border-radius: 12px; border: 1px solid var(--border);
      overflow: hidden;
    }
    .panel-header {
      padding: 16px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .panel-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .month-nav { display: flex; align-items: center; gap: 10px; }
    .month-nav button {
      width: 32px; height: 32px; border: 1px solid var(--border); background: #fff;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 14px;
    }
    .month-nav button:hover { background: var(--bg); border-color: var(--primary); color: var(--primary); }
    .month-nav .current-month { font-size: 15px; font-weight: 600; min-width: 110px; text-align: center; }

    /* Calendar Grid */
    .calendar-body { padding: 14px; }
    .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
    .weekday { text-align: center; font-size: 12px; font-weight: 600; color: var(--text-secondary); padding: 6px 0; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day {
      min-height: 76px; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px; cursor: pointer; transition: all 0.2s;
      position: relative; background: #fff;
    }
    .cal-day:hover { border-color: var(--primary); background: #f0f1ff; }
    .cal-day.other-month { opacity: 0.35; }
    .cal-day.today { border-color: var(--primary); background: #eef0ff; }
    .cal-day.selected { border-color: var(--primary); background: #e0e2ff; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    .day-num { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .today .day-num { color: var(--primary); }
    .day-badges { display: flex; flex-wrap: wrap; gap: 3px; }
    .badge-dot {
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 9px; font-weight: 600; color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .badge-video { background: #ef4444; }
    .badge-image { background: #3b82f6; }
    .badge-live { background: #f59e0b; }
    .badge-more { background: var(--text-secondary); font-size: 8px; }

    /* Day Detail Panel */
    .day-detail { padding: 14px 22px; border-top: 1px solid var(--border); background: #fafafa; }
    .day-detail-title {
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
    }
    .day-detail-actions { display: flex; gap: 6px; }
    .day-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .day-item:last-child { border-bottom: none; }
    .day-item-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; flex-shrink: 0; }
    .day-item-info { flex: 1; min-width: 0; }
    .day-item-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-item-meta { font-size: 11px; color: var(--text-secondary); }

    /* Status Tags */
    .status-tag {
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 500; flex-shrink: 0;
    }
    .status-published { background: #d1fae5; color: #065f46; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-draft { background: #e0e7ff; color: #3730a3; }

    /* Content Plan List */
    .plan-list { padding: 14px; }
    .plan-item {
      padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .plan-item:hover { border-color: var(--primary); background: #f8f7ff; box-shadow: 0 2px 8px rgba(99,102,241,0.1); }
    .plan-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; flex-shrink: 0; }
    .plan-info { flex: 1; min-width: 0; }
    .plan-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .plan-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .plan-platform {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 500;
    }
    .platform-douyin { background: #ffe4e4; color: #d43027; }
    .platform-xhs { background: #ffe8eb; color: #d2255a; }
    .platform-weibo { background: #fff3e4; color: #e73c1c; }
    .platform-bilibili { background: #e4f0ff; color: #00a1d6; }
    .platform-wechat { background: #e8f5e8; color: #07c160; }
    .platform-tiktok { background: #1a1a2e; color: #fff; }

    /* Status quick filter tabs in plan list */
    .status-filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .status-tab {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: #fff;
      transition: all 0.2s; white-space: nowrap;
    }
    .status-tab:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
    .status-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .status-tab.published.active { background: var(--success); border-color: var(--success); }
    .status-tab.pending.active { background: var(--warning); border-color: var(--warning); }
    .status-tab.draft.active { background: var(--info); border-color: var(--info); }

    /* Plan count badge */
    .plan-count-badge {
      background: var(--primary); color: #fff; border-radius: 20px;
      padding: 2px 8px; font-size: 11px; font-weight: 600;
    }

    /* Legend */
    .calendar-legend {
      display: flex; gap: 14px; padding: 6px 22px 0;
      font-size: 11px; color: var(--text-secondary); flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--text-secondary);
    }
    .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }
    .empty-state .empty-hint { font-size: 12px; margin-top: 6px; opacity: 0.7; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; visibility: hidden;
      transition: all 0.3s; padding: 16px;
    }
    .modal-overlay.show { opacity: 1; visibility: visible; }
    .modal-box {
      background: #fff; border-radius: 16px;
      width: 520px; max-width: 100%; max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s;
    }
    .modal-overlay.show .modal-box { transform: scale(1) translateY(0); }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .modal-close {
      width: 32px; height: 32px; border: none; background: var(--bg);
      border-radius: 8px; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    .modal-close:hover { background: #fee2e2; color: var(--danger); }
    .modal-body { padding: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: block; color: var(--text-primary); }
    .form-control {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s;
      outline: none; color: var(--text-primary); background: #fff;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 72px; }

    /* Template Cards */
    .template-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .template-card {
      border: 2px solid var(--border); border-radius: 10px;
      padding: 14px 10px; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .template-card:hover { border-color: var(--primary); background: #f0f1ff; }
    .template-card.selected { border-color: var(--primary); background: #eef0ff; }
    .template-icon { width: 44px; height: 44px; border-radius: 12px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
    .template-name { font-size: 13px; font-weight: 500; }
    .template-desc { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .btn-cancel {
      padding: 8px 20px; border: 1px solid var(--border); background: #fff;
      border-radius: 8px; font-size: 14px; cursor: pointer; transition: background 0.2s;
    }
    .btn-cancel:hover { background: var(--bg); }
    .btn-save {
      padding: 8px 24px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 14px;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-save:hover { background: var(--primary-dark); }

    /* Filter Tabs */
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-tab {
      padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: #fff;
      transition: all 0.2s; white-space: nowrap;
    }
    .filter-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .filter-tab:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--text-primary); color: #fff;
      padding: 10px 20px; border-radius: 10px;
      font-size: 14px; z-index: 2000;
      opacity: 0; transform: translateY(10px);
      transition: all 0.3s; pointer-events: none;
      display: flex; align-items: center; gap: 8px; max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    /* Responsive */
    @media (max-width: 1200px) {
      .calendar-section { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 900px) {
      .calendar-grid .cal-day { min-height: 64px; }
      .badge-dot { width: 15px; height: 15px; font-size: 8px; }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); z-index: 110; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggle { display: flex; }
      .sidebar-overlay.show { display: block; }
      .main { margin-left: 0; }
      .header { padding: 12px 16px; padding-left: 60px; }
      .content { padding: 16px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .calendar-grid .cal-day { min-height: 56px; padding: 4px; }
      .badge-dot { width: 14px; height: 14px; font-size: 7px; }
      .calendar-section { gap: 16px; }
      .toolbar { gap: 8px; }
      .filter-group { padding: 4px 8px; }
      .date-range-input { padding: 5px 8px; font-size: 12px; }
      .search-box { min-width: 100%; }
      .header-actions { gap: 8px; }
      .btn-primary-custom, .btn-export { padding: 7px 14px; font-size: 13px; }
      .form-row { grid-template-columns: 1fr; gap: 14px; }
      .modal-body { padding: 18px; }
      .toast { bottom: 16px; right: 16px; left: 16px; font-size: 13px; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stat-value { font-size: 22px; }
      .plan-item { flex-wrap: wrap; }
      .panel-header { padding: 14px 16px; }
      .calendar-legend { padding: 6px 16px 0; }
      .calendar-body { padding: 10px; }
    }
  </style>
</head>
<body>

<!-- Sidebar toggle (mobile) -->
<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="打开菜单">
  <i class="bi bi-list"></i>
</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h2><i class="bi bi-lightning-charge-fill" style="color:var(--primary)"></i> HotSpot</h2>
    <span>CONTENT OPERATIONS</span>
  </div>
  <div class="sidebar-nav">
    <a class="nav-item" href="#"><i class="bi bi-speedometer2"></i> 数据看板</a>
    <a class="nav-item" href="#"><i class="bi bi-fire"></i> 热点追踪</a>
    <a class="nav-item active" href="#"><i class="bi bi-calendar3-week"></i> 内容日历</a>
    <a class="nav-item" href="#"><i class="bi bi-folder2-open"></i> 选题库</a>
    <a class="nav-item" href="#"><i class="bi bi-magic"></i> AI 创作</a>

<script>
// ===== Data =====
let contentPlans = [
  { id:1,  title:"2026春季限定色号测评", date:"2026-03-03", type:"video",   platform:"douyin",  status:"published", note:"" },
  { id:2,  title:"开工第一天穿搭灵感",   date:"2026-03-04", type:"image",   platform:"xhs",      status:"published", note:"" },
  { id:3,  title:"3.8 女王节预热直播",  date:"2026-03-05", type:"live",    platform:"douyin",  status:"published", note:"" },
  { id:4,  title:"平价护肤好物红黑榜",  date:"2026-03-06", type:"video",   platform:"bilibili",status:"published", note:"" },
  { id:5,  title:"早春通勤妆容教程",     date:"2026-03-07", type:"video",   platform:"xhs",      status:"published", note:"" },
  { id:6,  title:"换季衣橱收纳指南",    date:"2026-03-08", type:"image",   platform:"douyin",  status:"published", note:"" },
  { id:7,  title:"周末探店：杭州新地标", date:"2026-03-09", type:"image",   platform:"weibo",    status:"published", note:"" },
  { id:8,  title:"2026春季穿搭趋势解读",date:"2026-03-10", type:"video",   platform:"xhs",      status:"published", note:"" },
  { id:9,  title:"素人改造：学生变精致", date:"2026-03-11", type:"video",   platform:"douyin",  status:"pending",   note:"" },
  { id:10, title:"护肤成分党必看科普",   date:"2026-03-12", type:"image",   platform:"wechat",  status:"pending",   note:"" },
  { id:11, title:"春日限定美食清单",     date:"2026-03-13", type:"image",   platform:"xhs",      status:"pending",   note:"" },
  { id:12, title:"AIGC 助力内容创作技巧",date:"2026-03-14", type:"live",   platform:"bilibili",status:"pending",   note:"" },
  { id:13, title:"职场穿搭进阶指南",     date:"2026-03-15", type:"video",   platform:"douyin",  status:"draft",     note:"" },
  { id:14, title:"3.15 消费者权益日特辑",date:"2026-03-15", type:"image",   platform:"weibo",    status:"pending",   note:"" },
  { id:15, title:"周末好物开箱分享",     date:"2026-03-17", type:"video",   platform:"tiktok",  status:"draft",     note:"" },
  { id:16, title:"清明踏青目的地推荐",   date:"2026-03-18", type:"image",   platform:"xhs",      status:"draft",     note:"" },
  { id:17, title:"美妆新品速递第12期",   date:"2026-03-20", type:"video",   platform:"douyin",  status:"pending",   note:"" },
  { id:18, title:"月度好物颁奖典礼",    date:"2026-03-25", type:"live",    platform:"bilibili",status:"pending",   note:"" },
];

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let selectedDay = null;
let selectedTemplate = 'video';
let currentTypeFilter = 'all';
let currentStatusFilter = 'all';

// ===== Helpers =====
const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function getTypeIcon(type) {
  const map = { video:'🎬', image:'📷', live:'📺' };
  return map[type] || '📝';
}
function getTypeBg(type) {
  const map = { video:'linear-gradient(135deg,#ef4444,#f97316)', image:'linear-gradient(135deg,#3b82f6,#6366f1)', live:'linear-gradient(135deg,#f59e0b,#eab308)' };
  return map[type] || '#6366f1';
}
function getPlatformName(platform) {
  const map = { douyin:'抖音', xhs:'小红书', weibo:'微博', bilibili:'B站', wechat:'微信', tiktok:'TikTok' };
  return map[platform] || platform;
}
function getPlatformClass(platform) {
  const map = { douyin:'douyin', xhs:'xhs', weibo:'weibo', bilibili:'bilibili', wechat:'wechat', tiktok:'tiktok' };
  return `platform-${map[platform] || platform}`;
}
function getStatusClass(status) {
  const map = { published:'status-published', pending:'status-pending', draft:'status-draft' };
  return map[status] || '';
}
function getStatusText(status) {
  const map = { published:'已发布', pending:'待发布', draft:'草稿' };
  return map[status] || status;
}

// ===== Filtering =====
function getFilteredPlans(plans) {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  const typeFilter = document.getElementById('filterType').value;
  const platformFilter = document.getElementById('filterPlatform').value;
  const dateFrom = document.getElementById('filterDateFrom').value;
  const dateTo = document.getElementById('filterDateTo').value;

  return plans.filter(p => {
    if (typeFilter !== 'all' && p.type !== typeFilter) return false;
    if (platformFilter !== 'all' && p.platform !== platformFilter) return false;
    if (currentStatusFilter !== 'all' && p.status !== currentStatusFilter) return false;
    if (dateFrom && p.date < dateFrom) return false;
    if (dateTo && p.date > dateTo) return false;
    if (searchTerm) {
      const searchable = `${p.title} ${getPlatformName(p.platform)} ${getStatusText(p.status)}`.toLowerCase();
      if (!searchable.includes(searchTerm)) return false;
    }
    return true;
  });
}

function applyFilters() {
  renderCalendar();
  renderActiveFilters();
  const resetBtn = document.getElementById('btnResetFilter');
  const hasActive = document.getElementById('filterType').value !== 'all'
    || document.getElementById('filterPlatform').value !== 'all'
    || document.getElementById('filterDateFrom').value !== ''
    || document.getElementById('filterDateTo').value !== ''
    || document.getElementById('searchInput').value.trim() !== ''
    || currentStatusFilter !== 'all';
  resetBtn.style.display = hasActive ? 'inline-flex' : 'none';
}

function resetFilters() {
  document.getElementById('filterType').value = 'all';
  document.getElementById('filterPlatform').value = 'all';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  document.getElementById('searchInput').value = '';
  currentStatusFilter = 'all';
  document.getElementById('btnResetFilter').style.display = 'none';
  // Reset stat card highlights
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
  renderCalendar();
  renderActiveFilters();
}

function renderActiveFilters() {
  const chips = [];
  const typeFilter = document.getElementById('filterType').value;
  const platformFilter = document.getElementById('filterPlatform').value;
  const dateFrom = document.getElementById('filterDateFrom').value;
  const dateTo = document.getElementById('filterDateTo').value;
  const search = document.getElementById('searchInput').value.trim();

  if (typeFilter !== 'all') {
    const labels = { video:'🎬 视频', image:'📷 图文', live:'📺 直播' };
    chips.push(`<span class="filter-chip">${labels[typeFilter]} <i class="bi bi-x" onclick="clearFilter('type')"></i></span>`);
  }
  if (platformFilter !== 'all') {
    const labels = { douyin:'抖音', xhs:'小红书', weibo:'微博', bilibili:'B站', wechat:'微信', tiktok:'TikTok' };
    chips.push(`<span class="filter-chip">📍 ${labels[platformFilter]} <i class="bi bi-x" onclick="clearFilter('platform')"></i></span>`);
  }
  if (dateFrom || dateTo) {
    const label = dateFrom && dateTo ? `${dateFrom.slice(5)}~${dateTo.slice(5)}` : dateFrom ? `${dateFrom.slice(5)}起` : `~${dateTo.slice(5)}`;
    chips.push(`<span class="filter-chip">📅 ${label} <i class="bi bi-x" onclick="clearFilter('date')"></i></span>`);
  }
  if (search) {
    chips.push(`<span class="filter-chip">🔍 "${search}" <i class="bi bi-x" onclick="clearFilter('search')"></i></span>`);
  }
  if (currentStatusFilter !== 'all') {
    const labels = { published:'✅ 已发布', pending:'⏳ 待发布', draft:'📄 草稿' };
    chips.push(`<span class="filter-chip">${labels[currentStatusFilter]} <i class="bi bi-x" onclick="clearFilter('status')"></i></span>`);
  }

  document.getElementById('activeFilters').innerHTML = chips.join('');
}

function clearFilter(type) {
  if (type === 'type') document.getElementById('filterType').value = 'all';
  else if (type === 'platform') document.getElementById('filterPlatform').value = 'all';
  else if (type === 'date') { document.getElementById('filterDateFrom').value = ''; document.getElementById('filterDateTo').value = ''; }
  else if (type === 'search') document.getElementById('searchInput').value = '';
  else if (type === 'status') { currentStatusFilter = 'all'; document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter')); }
  applyFilters();
}

// ===== Status filter via stat cards =====
function filterByStatusChip(status, el) {
  if (currentStatusFilter === status) {
    currentStatusFilter = 'all';
    el.classList.remove('active-filter');
  } else {
    document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
    currentStatusFilter = status;
    el.classList.add('active-filter');
  }
  applyFilters();
}

// ===== Calendar helpers =====
function getFilteredPlansForDate(dateStr) {
  return getFilteredPlans(contentPlans).filter(p => p.date === dateStr);
}

function getDayBadgeHtml(plan) {
  const icons = { video:'🎬', image:'📷', live:'📺' };
  return `<div class="badge-dot badge-${plan.type}" title="${icons[plan.type]} ${getPlatformName(plan.platform)}">${icons[plan.type]}</div>`;
}

function getDayPlansSummary(dateStr) {
  const plans = getFilteredPlansForDate(dateStr);
  if (!plans.length) return '';
  const shown = plans.slice(0, 3);
  const more = plans.length - 3;
  let html = '<div class="day-badges">';
  shown.forEach(p => { html += getDayBadgeHtml(p); });
  if (more > 0) html += `<div class="badge-dot badge-more" title="还有${more}条">+${more}</div>`;
  html += '</div>';
  return html;
}

// ===== Render Calendar =====
function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  const label = document.getElementById('currentMonthLabel');
  label.textContent = `${currentYear}年${monthNames[currentMonth]}`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Update calendar month badge count
  const monthFiltered = getFilteredPlans(contentPlans.filter(p => {
    const d = new Date(p.date);
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  }));
  document.getElementById('calMonthCount').textContent = monthFiltered.length > 0 ? monthFiltered.length : '';

  let html = '';

  // Previous month trailing days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    const prevM = currentMonth === 0 ? 11 : currentMonth - 1;
    const prevY = currentMonth === 0 ? currentYear - 1 : currentYear;
    const dateStr = `${prevY}-${String(prevM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<div class="cal-day other-month" onclick="selectDate('${dateStr}')">
      <div class="day-num">${d}</div>
      ${getDayPlansSummary(dateStr)}
    </div>`;
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if (dateStr === todayStr) cls += ' today';
    if (selectedDay === dateStr) cls += ' selected';
    html += `<div class="${cls}" onclick="selectDate('${dateStr}')">
      <div class="day-num">${d}</div>
      ${getDayPlansSummary(dateStr)}
    </div>`;
  }

  // Next month leading days
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remaining; d++) {
    const nextM = currentMonth === 11 ? 0 : currentMonth + 1;
    const nextY = currentMonth === 11 ? currentYear + 1 : currentYear;
    const dateStr = `${nextY}-${String(nextM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<div class="cal-day other-month" onclick="selectDate('${dateStr}')">
      <div class="day-num">${d}</div>
      ${getDayPlansSummary(dateStr)}
    </div>`;
  }

  grid.innerHTML = html;
  renderPlanList();
  updateStats();
}

// ===== Month Navigation =====
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  selectedDay = null;
  document.getElementById('dayDetail').style.display = 'none';
  renderCalendar();
}

// ===== Select Date =====
function selectDate(dateStr) {
  selectedDay = dateStr;
  renderCalendar();
  showDayDetail(dateStr);
}

function showDayDetail(dateStr) {
  const detail = document.getElementById('dayDetail');
  const titleEl = document.getElementById('dayDetailTitle');
  const itemsEl = document.getElementById('dayDetailItems');
  const plans = getFilteredPlansForDate(dateStr);

  if (!plans.length) {
    detail.style.display = 'none';
    return;
  }

  const parts = dateStr.split('-');
  titleEl.textContent = `${parseInt(parts[1])}月${parseInt(parts[2])}日 — ${plans.length} 条内容`;

  let html = '';
  plans.forEach(p => {
    html += `<div class="day-item">
      <div class="day-item-icon" style="background:${getTypeBg(p.type)}">${getTypeIcon(p.type)}</div>
      <div class="day-item-info">
        <div class="day-item-title">${p.title}</div>
        <div class="day-item-meta">${getPlatformName(p.platform)} · ${getStatusText(p.status)}</div>
      </div>
      <span class="status-tag ${getStatusClass(p.status)}">${getStatusText(p.status)}</span>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button onclick="cycleStatus(${p.id})" title="切换状态" style="border:none;background:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;transition:background 0.2s" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='none'">🔄</button>
        <button onclick="deletePlan(${p.id})" title="删除" style="border:none;background:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;color:var(--danger);transition:background 0.2s" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='none'">🗑️</button>
      </div>
    </div>`;
  });
  itemsEl.innerHTML = html;
  detail.style.display = 'block';
}

// ===== Render Plan List =====
function renderPlanList() {
  const list = document.getElementById('planList');
  const filtered = getFilteredPlans(contentPlans);

  // Filter by type tab (local to this panel)
  let plans = filtered;
  if (currentTypeFilter !== 'all') {
    plans = plans.filter(p => p.type === currentTypeFilter);
  }

  // Sort by date ascending
  plans.sort((a, b) => a.date.localeCompare(b.date));

  document.getElementById('listCountBadge').textContent = plans.length > 0 ? plans.length : '';

  if (!plans.length) {
    list.innerHTML = `<div class="empty-state">
      <i class="bi bi-inbox"></i>
      <p>暂无内容计划</p>
      <div class="empty-hint">尝试调整筛选条件或添加新内容</div>
    </div>`;
    return;
  }

  let html = '';
  plans.forEach(p => {
    const isFiltered = p.date.startsWith(`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`) ? '' : 'style="opacity:0.75"';
    html += `<div class="plan-item" onclick="selectDate('${p.date}')" ${isFiltered}>
      <div class="plan-icon" style="background:${getTypeBg(p.type)}">${getTypeIcon(p.type)}</div>
      <div class="plan-info">
        <div class="plan-title">${p.title}</div>
        <div class="plan-meta">
          <span class="plan-platform ${getPlatformClass(p.platform)}">${getPlatformName(p.platform)}</span>
          <span>${p.date}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="status-tag ${getStatusClass(p.status)}">${getStatusText(p.status)}</span>
        <button onclick="event.stopPropagation(); cycleStatus(${p.id})" title="切换状态" style="border:none;background:none;cursor:pointer;font-size:14px;padding:2px;border-radius:4px;transition:background 0.2s" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='none'">🔄</button>
        <button onclick="event.stopPropagation(); deletePlan(${p.id})" title="删除" style="border:none;background:none;cursor:pointer;font-size:14px;padding:2px;border-radius:4px;color:var(--danger);transition:background 0.2s" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='none'">🗑️</button>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

// ===== Update Stats =====
function updateStats() {
  const monthPlans = contentPlans.filter(p => {
    const d = new Date(p.date);
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  });
  const total = monthPlans.length;
  const published = monthPlans.filter(p => p.status === 'published').length;
  const pending = monthPlans.filter(p => p.status === 'pending').length;
  const draft = monthPlans.filter(p => p.status === 'draft').length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-all-count').textContent = total;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-published').textContent = published;
  document.getElementById('stat-draft').textContent = draft;
}

// ===== Type filter tabs =====
function filterPlans(type, el) {
  currentTypeFilter = type;
  document.querySelectorAll('.panel .filter-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderPlanList();
}

// ===== Modal =====
function openModal(dateStr) {
  const modal = document.getElementById('modal');
  modal.classList.add('show');
  document.getElementById('planTitle').value = '';
  document.getElementById('planDate').value = dateStr || selectedDay || new Date().toISOString().slice(0,10);
  document.getElementById('planPlatform').value = 'douyin';
  document.getElementById('planStatus').value = 'draft';
  document.getElementById('planNote').value = '';
  selectedTemplate = 'video';
  document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
  document.querySelector('.template-card[data-type="video"]').classList.add('selected');
  // Clear error states
  ['planTitle','planDate'].forEach(id => { document.getElementById(id).style.borderColor = ''; });
  document.getElementById('planTitle').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function selectTemplate(el) {
  document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedTemplate = el.dataset.type;
}

function savePlan() {
  const title = document.getElementById('planTitle').value.trim();
  const date = document.getElementById('planDate').value;
  const platform = document.getElementById('planPlatform').value;
  const status = document.getElementById('planStatus').value;
  const note = document.getElementById('planNote').value.trim();
  let valid = true;

  if (!title) {
    document.getElementById('planTitle').style.borderColor = 'var(--danger)';
    if (valid) document.getElementById('planTitle').focus();
    valid = false;
  } else {
    document.getElementById('planTitle').style.borderColor = '';
  }
  if (!date) {
    document.getElementById('planDate').style.borderColor = 'var(--danger)';
    if (valid) document.getElementById('planDate').focus();
    valid = false;
  } else {
    document.getElementById('planDate').style.borderColor = '';
  }
  if (!valid) return;

  const newId = contentPlans.length > 0 ? Math.max(...contentPlans.map(p => p.id)) + 1 : 1;
  contentPlans.push({ id: newId, title, date, type: selectedTemplate, platform, status, note });

  const planDate = new Date(date);
  if (planDate.getMonth() !== currentMonth || planDate.getFullYear() !== currentYear) {
    currentMonth = planDate.getMonth();
    currentYear = planDate.getFullYear();
  }

  closeModal();
  showToast('内容计划已保存', 'success');
  renderCalendar();
  showDayDetail(date);
}

// ===== Status Toggle =====
function cycleStatus(id) {
  const plan = contentPlans.find(p => p.id === id);
  if (!plan) return;
  const cycle = { draft: 'pending', pending: 'published', published: 'draft' };
  plan.status = cycle[plan.status] || 'draft';
  showToast(`状态已更新为「${getStatusText(plan.status)}」`, 'success');
  renderCalendar();
  if (selectedDay) showDayDetail(selectedDay);
}

// ===== Delete Plan =====
function deletePlan(id) {
  if (!confirm('确定要删除这条内容计划吗？')) return;
  contentPlans = contentPlans.filter(p => p.id !== id);
  showToast('内容计划已删除', 'success');
  renderCalendar();
  if (selectedDay) showDayDetail(selectedDay);
}

// ===== Export CSV =====
function exportCSV() {
  const filtered = getFilteredPlans(contentPlans);
  if (!filtered.length) {
    showToast('当前筛选条件下没有可导出的数据', 'error');
    return;
  }
  const headers = ['ID', '标题', '日期', '类型', '平台', '状态', '备注'];
  const rows = filtered.map(p => [
    p.id,
    `"${p.title.replace(/"/g, '""')}"`,
    p.date,
    { video:'短视频', image:'图文笔记', live:'直播' }[p.type] || p.type,
    getPlatformName(p.platform),
    getStatusText(p.status),
    `"${(p.note || '').replace(/"/g, '""')}"`
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateLabel = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `内容日历_${dateLabel}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`已导出 ${filtered.length} 条数据`, 'success');
}

// ===== Toast =====
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.className = `toast ${type} bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-circle-fill'}`;
  toast.innerHTML = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== Sidebar mobile =====
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openModal(); }
});
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ===== Init =====
renderCalendar();
</script>
</body>
</html>
