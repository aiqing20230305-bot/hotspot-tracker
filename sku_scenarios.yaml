# SKU场景库 - 特赞内容运营平台
# 每个SKU包含：基础信息、使用场景、用户痛点、情感共鸣、内容角度

skus:
  # 3C数码 - 荣耀
  - client: "3C数码-荣耀"
    sku_name: "荣耀Magic6"
    sku_specs: "骁龙8 Gen3/16GB+512GB/5450mAh"
    core_selling_points:
      - "AI大模型加持，智能助手更懂你"
      - "鹰眼相机，抓拍更清晰"
      - "青海湖电池，续航无忧"
      - "鸿蒙生态，万物互联"
    
    scenarios:
      - name: "职场效率提升"
        pain_point: "工作消息太多，回复不过来；会议记录整理耗时"
        resonance: "想要工作生活平衡，不想被工作绑架"
        content_angles:
          - "AI助手自动回复消息，效率翻倍"
          - "语音转文字+智能摘要，会议纪要5分钟搞定"
          - "多屏协同，手机电脑无缝切换"
        hot_topics_match: ["打工人效率", "职场技能", "AI办公"]
      
      - name: "亲子记录时光"
        pain_point: "孩子动作太快，拍出来都是糊的；照片太多整理麻烦"
        resonance: "想记录孩子每一个成长瞬间，留住美好回忆"
        content_angles:
          - "鹰眼抓拍，孩子跑动也能清晰记录"
          - "AI自动分类，按时间/人物/场景整理照片"
          - "一键生成成长视频，回忆满满"
        hot_topics_match: ["亲子时光", "宝宝成长", "拍照技巧"]
      
      - name: "商务出行必备"
        pain_point: "出差手机没电焦虑；境外网络不稳定"
        resonance: "商务人士需要可靠的工具，不能掉链子"
        content_angles:
          - "青海湖电池，一天重度使用无忧"
          - "天际通，境外一键上网"
          - "隐私空间，工作生活分开"
        hot_topics_match: ["商务出行", "出差必备", "效率工具"]
  
