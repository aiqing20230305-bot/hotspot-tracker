# 方法论总结
methodology:
  场景设计原则:
    - "痛点要具体，让用户产生'我也是'的共鸣"
    - "情感要真实，避免过度煽情"
    - "解决方案要简单，降低用户行动门槛"
    - "内容角度要多样，适配不同平台特性"
  
  热点匹配原则:
    - "场景痛点与热点话题高度相关"
    - "产品卖点能自然融入热点内容"
    - "借势角度有新意，不是硬广"
    - "能引发用户互动和讨论"
