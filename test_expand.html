<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
.client-card { border: 1px solid #ddd; margin: 10px; }
.client-header { background: #f5f5f5; padding: 10px; cursor: pointer; }
.ideas-list { display: none; padding: 10px; background: #fff; }
.client-card.expanded .ideas-list { display: block; }
.expand-icon { transition: transform 0.2s; }
.client-card.expanded .expand-icon { transform: rotate(180deg); }
</style>
</head>
<body>
<h1>展开测试</h1>

<div class="client-card" data-priority="high">
    <div class="client-header" onclick="toggleClient(this)">
        <span>客户1 - 点击展开</span>
        <span class="expand-icon">▼</span>
    </div>
    <div class="ideas-list">
        <div>选题1</div>
        <div>选题2</div>
        <div>选题3</div>
    </div>
</div>

<div class="client-card" data-priority="high">
    <div class="client-header" onclick="toggleClient(this)">
        <span>客户2 - 点击展开</span>
        <span class="expand-icon">▼</span>
    </div>
    <div class="ideas-list">
        <div>选题A</div>
        <div>选题B</div>
    </div>
</div>

<script>
function toggleClient(header) {
    const card = header.closest('.client-card');
    card.classList.toggle('expanded');
}

document.addEventListener('DOMContentLoaded', function() {
    const firstCard = document.querySelector('.client-card');
    if (firstCard) {
        firstCard.classList.add('expanded');
    }
});
</script>
</body>
</html>
